# CryptoTrace — cargo-deny configuration
[advisories]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
yanked = "warn"
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
]
deny = []
unlicensed = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []
skip = []
skip-tree = [
    # ring pulls in older crates via its vendored dependencies
    { name = "ring", version = "*" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-org = { github = [], gitlab = [] }
allow-git = []
