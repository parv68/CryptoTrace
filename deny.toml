# CryptoTrace — cargo-deny configuration
[advisories]
yanked = "warn"
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
skip = []
skip-tree = [
    { name = "ring", version = "*" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-org = { github = [], gitlab = [] }
allow-git = []
